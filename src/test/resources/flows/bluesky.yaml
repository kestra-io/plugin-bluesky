id: bluesky
namespace: io.kestra.tests

inputs:
  - id: baseUrl
    type: STRING
    defaults: "http://localhost:59443"

tasks:
  - id: bluesky
    type: io.kestra.plugin.bluesky.BlueskyExecution
    identifier: "testhandle.bsky.social"
    appPassword: "test-app-password"
    baseUrl: "{{ inputs.baseUrl }}"
    executionId: "{{ trigger.executionId ?? execution.id }}"
    customMessage: "myCustomMessage"
    customFields:
      Environment: "DEV"
      Cloud: "GCP"

triggers:
  - id: on_failure
    type: io.kestra.plugin.core.trigger.Flow
    preconditions:
      id: flow_trigger
      flows:
        - namespace: io.kestra.tests
          flowId: main-flow-that-fails
          states: [ FAILED ]
